<!DOCTYPE html>
<!-- 声明这是HTML5文档，是所有HTML页面的第一行必备代码 -->
<html lang="zh-CN">
<!-- html标签是页面的根标签，lang="zh-CN"指定页面语言为中文 -->
<head>
    <!-- head标签：存放页面的元信息（不直接显示在页面上） -->
    <meta charset="UTF-8">
    <!-- 字符编码：UTF-8是通用编码，避免中文乱码 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 适配移动端：让页面在手机上正常显示 -->
    <title>我的第一个Git Page</title>
    <!-- title标签：页面标题，会显示在浏览器标签栏 -->
</head>
<body>
    <!-- body标签：页面的可视内容都放在这里 -->
    <h1>👋 你好，这是我的Git Page主页！</h1>
    <p>这是通过index.html创建的最简单的静态网页。</p>
    <p>可以在这里添加文字、图片、链接等任意HTML内容。</p>
</body>
</html>
